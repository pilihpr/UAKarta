      font-weight: 500;

      background: #e5e7eb;

    }

      cursor: default;
      opacity: 0.6;

    ];

    const overviewLayer = L.featureGroup().addTo(map);
    let activeDetailLayer = null;

    let currentMode = "regioner";        // default mode
    const municipalitiesLayer = L.featureGroup();  // holds all municipalities

    function getRegionStyle(regionName) {
      return {
        color: "#222",
        weight: 2,
        fillColor: regionColors[regionName],
        fillOpacity: 0.4
      };
    }

    function getHighlightStyle(regionName) {
      return {
        color: "#000",
        weight: 3,
        fillColor: regionColors[regionName],
        fillOpacity: 0.6
      };
    }

    // Green: #38B879
    // Orange: #f8971d
    // Red: #d91f50
    // Ljusgrön: #82cca3
    // Ljusröd: #e6737e
    // Ljusorange: #fab36d

    const nordMunicipalityColors = {
      //Reion Nord
      "UA Luleå": "#38B879",
      "UA Örnsköldsvik": "#38B879",
      "UA Skellefteå": "#f8971d",
      "UA Umeå": "#d91f50",
      "UA Östersund": "#38B879",
      "UA Sundsvall": "#f8971d",
      //Region Mitt
      "UA Gävle": "#38B879",
      "UA Dalarna": "#d91f50",
      "UA Karlstad": "#f8971d",
      "UA Örebro": "#82cca3",
      "UA Västerås": "#f8971d",
      "UA Eskilstuna": "#38B879",
      "UA Norrköping": "#e6737e",
      "UA Linköping": "#fab36d",
    };

    regionFiles.forEach(region => {

      const loadData = region.data
        ? Promise.resolve(region.data)
        : fetch(region.file).then(res => res.json());

      loadData.then(data => {

        // Merge all polygons in file into one region shape
        let merged = data.features[0];

        for (let i = 1; i < data.features.length; i++) {
          merged = turf.union(merged, data.features[i]);
        }
        //Commented out to test if it works without merging, which it does, but I think it looks better merged. Can easily be switched back if wanted.
        /*       const regionLayer = L.geoJSON(merged, {
                style: getRegionStyle(region.name)
              }).bindTooltip(region.name, { sticky: true }); */

        // Create layer for region overview
        const regionLayer = L.geoJSON(merged, {
          style: getRegionStyle(region.name)
        });

        regionLayer.bindTooltip(region.name, {
          permanent: true,
          direction: "center",
          className: "region-label"
        });

        // Hover highlight
        regionLayer.on("mouseover", function (e) {
          e.target.setStyle(getHighlightStyle(region.name));
        });

        regionLayer.on("mouseout", function (e) {
          e.target.setStyle(getRegionStyle(region.name));
        });

        // Click → show detailed municipalities
        regionLayer.on("click", function () {

          map.removeLayer(overviewLayer);

          if (activeDetailLayer) {
            map.removeLayer(activeDetailLayer);
          }

          activeDetailLayer = L.geoJSON(data, {

            style: function (feature) {
              const name = feature.properties.description.match(/kom_namn:\s(.+)/)?.[1] || "";

              return {
                color: "#222",
                weight: 1.5,
                fillColor: nordMunicipalityColors[name] || "#999",
                fillOpacity: 0.5
              };
            },

            onEachFeature: function (feature, layer) {

              const name = feature.properties.description.match(/kom_namn:\s(.+)/)?.[1] || "";

              //Commented out to test if it works without tooltip, which it does, but I think it looks better with. Can easily be switched back if wanted.
              // Tooltip on hover
              layer.bindTooltip(name, {
                sticky: false
              });

              /* layer.bindTooltip(name, {
                permanent: true,
                direction: "center",
                className: "municipality-label"
              }); */

              // Hover highlight
              layer.on("mouseover", function (e) {
                e.target.setStyle({
                  weight: 3,
                  fillOpacity: 0.8
                });
              });

              layer.on("mouseout", function (e) {
                activeDetailLayer.resetStyle(e.target);
              });

              layer.on("click", function (e) {
                map.fitBounds(e.target.getBounds(), {
                  padding: [10, 10],
                  maxZoom: 12
                });
              });
            }

          }).addTo(map);

          map.fitBounds(activeDetailLayer.getBounds());
        });
        //RELOAD
        const muniLayer = L.geoJSON(data, {

          style: function (feature) {
            const name = feature.properties.description.match(/kom_namn:\s(.+)/)?.[1] || "";

            return {
              color: "#222",
              weight: 1.5,
              fillColor: nordMunicipalityColors[name] || "#999",
              fillOpacity: 0.5
            };
          },

          onEachFeature: function (feature, layer) {

            const name = feature.properties.description.match(/kom_namn:\s(.+)/)?.[1] || "";

            layer.bindTooltip(name, { sticky: false });

            layer.on("mouseover", function (e) {
              e.target.setStyle({
                weight: 3,
                fillOpacity: 0.8
              });
            });

            layer.on("mouseout", function (e) {
              muniLayer.resetStyle(e.target);
            });

            layer.on("click", function (e) {
              map.fitBounds(e.target.getBounds(), {
                padding: [10, 10],
                maxZoom: 12
              });
            });

          }

        });

        municipalitiesLayer.addLayer(muniLayer);

        overviewLayer.addLayer(regionLayer);

      });

    });
    const resetControl = L.control({ position: "topright" });

    resetControl.onAdd = function () {

      const div = L.DomUtil.create("div", "custom-control");

      /*       const div = L.DomUtil.create("div");
            div.style.background = "white";
            div.style.padding = "6px";
            div.style.display = "flex";
            div.style.flexDirection = "column";
            div.style.gap = "4px"; */

      const backBtn = L.DomUtil.create("button", "", div);
      backBtn.innerHTML = "Tillbaka";

      const regionBtn = L.DomUtil.create("button", "", div);
      regionBtn.innerHTML = "Regioner";

      const lokalBtn = L.DomUtil.create("button", "", div);
      lokalBtn.innerHTML = "Lokalavdelningar";

      function updateButtonStyles() {

        regionBtn.classList.remove("active");
        lokalBtn.classList.remove("active");

        if (currentMode === "regioner") {
          regionBtn.classList.add("active");
        }

        if (currentMode === "lokal") {
          lokalBtn.classList.add("active");
        }

      }

      /*       function updateButtonStyles() {
              regionBtn.style.background =
                currentMode === "regioner" ? "#ccc" : "white";
      
              lokalBtn.style.background =
                currentMode === "lokal" ? "#ccc" : "white";
            } */

      // BACK BUTTON
      backBtn.onclick = function () {

        if (activeDetailLayer) {
          map.removeLayer(activeDetailLayer);
          activeDetailLayer = null;
        }

        map.removeLayer(municipalitiesLayer);
        overviewLayer.addTo(map);
        map.fitBounds(overviewLayer.getBounds());

        currentMode = "regioner";
        updateButtonStyles();
      };

      // REGIONER BUTTON
      regionBtn.onclick = function () {

        if (currentMode === "regioner") return;

        map.removeLayer(municipalitiesLayer);

        if (activeDetailLayer) {
          map.removeLayer(activeDetailLayer);
          activeDetailLayer = null;
        }

        overviewLayer.addTo(map);
        map.fitBounds(overviewLayer.getBounds());

        currentMode = "regioner";
        updateButtonStyles();
      };

      // LOKALAVDELNINGAR BUTTON
      lokalBtn.onclick = function () {

        if (currentMode === "lokal") return;

        map.removeLayer(overviewLayer);

        if (activeDetailLayer) {
          map.removeLayer(activeDetailLayer);
          activeDetailLayer = null;
        }

        municipalitiesLayer.addTo(map);

        currentMode = "lokal";
        updateButtonStyles();
      };

      // Initial state
      overviewLayer.addTo(map);
      updateButtonStyles();

      return div;
    };

    resetControl.addTo(map);
  </script>
